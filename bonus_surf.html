<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Orion & Yasminn — Bônus Surf</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;font-family:system-ui;height:100vh;}
.wrap{display:grid;place-items:center;height:100vh;gap:0;padding:0}
.stack{position:relative;width:100%;max-width:520px;height:100vh;}
#game{width:100%;height:100%;background:#000;display:block;touch-action:manipulation;image-rendering:pixelated;image-rendering:-moz-crisp-edges;image-rendering:crisp-edges;}
</style>
</head>
<body>
<div class="wrap">
  <div class="stack">
    <canvas id="game"></canvas>
  </div>
</div>

<!-- Áudios do jogo principal -->
<audio id="introSound" src="assets/intro.mp3" preload="auto"></audio>
<audio id="bgMusic" src="assets/bg_music.mp3" preload="auto" loop></audio>
<audio id="jumpSound" src="assets/jump.mp3" preload="auto"></audio>
<audio id="hitSound" src="assets/hit.mp3" preload="auto"></audio>
<audio id="pointSound" src="assets/point.mp3" preload="auto"></audio>
<audio id="phaseSound" src="assets/phase_up.mp3" preload="auto"></audio>

<script>
const cvs = document.getElementById('game');

/* 🔧 CORREÇÃO CRÍTICA: alpha PRECISA ser true */
const ctx = cvs.getContext('2d');
ctx.imageSmoothingEnabled = false;

function fit(){
  const dpr=Math.max(1,Math.min(window.devicePixelRatio||1,2));
  const w=cvs.clientWidth,h=cvs.clientHeight;
  cvs.width=Math.round(w*dpr); cvs.height=Math.round(h*dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
new ResizeObserver(fit).observe(cvs); fit();

// ----- CONFIGURAÇÕES -----
const GROUND_Y = 0.72;
const WATER_Y  = 0.75;
const SURFER_Y = 0.75;
const WAVE_SPEED = 0.12;
const WAVE_AMPLITUDE = 12;
const WAVE_PUSH_DIST = 0.12;

// Posição do jogador ajustada para mobile
function updatePlayerPosition(){
  const w = cvs.clientWidth;
  if(w < 600){
    PLAYER_X = Math.round(w*0.20); // mais à esquerda em mobile
  } else if(w < 800){
    PLAYER_X = Math.round(w*0.25); // intermediário
  } else {
    PLAYER_X = Math.round(w*0.35); // posição normal em desktop
  }
}

let PLAYER_X = Math.round(cvs.clientWidth*0.35);
new ResizeObserver(()=>{ 
  updatePlayerPosition(); 
}).observe(cvs);

// Constantes baseadas no jogo principal
const UNIT = () => Math.max(6, Math.round(cvs.clientHeight/30));
const GY = () => Math.round(cvs.clientHeight*0.80);

// ----- SPRITES -----
const SPRITE_FILES = [
  './sprite3.png',
  './sprite4.png', 
  './sprite5.png'
];

let currentSpriteIndex = 0;
let SPRITE = new Image();
SPRITE.src = SPRITE_FILES[currentSpriteIndex];

function changeRandomSprite() {
  currentSpriteIndex = Math.floor(Math.random() * SPRITE_FILES.length);
  SPRITE.src = SPRITE_FILES[currentSpriteIndex];
  console.log('Mudando para sprite:', SPRITE_FILES[currentSpriteIndex]);
}

// Carregar sprite inicial
SPRITE.onload = () => {
  state.spriteLoaded = true;
  console.log('Sprite carregado:', SPRITE_FILES[currentSpriteIndex]);
};

const OBSTACLE_SPRITE = new Image();
OBSTACLE_SPRITE.src = './obstaculos.png';

// ----- ÁUDIOS -----
const introSound = document.getElementById('introSound');
const bgMusic = document.getElementById('bgMusic');
const jumpSound = document.getElementById('jumpSound');
const hitSound = document.getElementById('hitSound');
const pointSound = document.getElementById('pointSound');
const phaseSound = document.getElementById('phaseSound');

function safePlay(el){
  if(!el) return;
  try { el.currentTime = 0; } catch(_) {}
  el.play().catch(_=>{});
}

const SPR_COLS = 5;
const SPR_ROWS = 4;
const OBS_COLS = 1; // 1 coluna
const OBS_ROWS = 3; // 3 linhas: 0=piranha, 1=tronco, 2=tubarão

function spriteCellSize(){
  return {
    sw: SPRITE.naturalWidth  / SPR_COLS,
    sh: SPRITE.naturalHeight / SPR_ROWS
  };
}

function obstacleCellSize(){
  return {
    ow: OBSTACLE_SPRITE.naturalWidth / OBS_COLS,
    oh: OBSTACLE_SPRITE.naturalHeight / OBS_ROWS
  };
}

// ----- ESTADO -----
const state = {
  mode: 'run',    // 'run' | 'surf'
  t: 0,
  waveX: -0.5, // posição original (começa da esquerda)
  wavePhase: 0,
  surferX: 0.05, // agora relativo ao mundo
  surferY: 0,
  jumpY: 0, // altura do pulo
  jumpVelocity: 0, // velocidade do pulo
  isJumping: false, // se está pulando
  jumpTilt: 0, // inclinação durante o pulo
  jumpForwardX: 0, // deslocamento horizontal durante o pulo
  jumpSpin: 0, // ângulo de pirueta (radianos)
  jumpSpinDir: 1, // direção da pirueta: 1=trás, -1=frente
  jumpDoSpin: false, // se este pulo terá pirueta
  jumpCount: 0, // contador de pulos
  nextSpinAt: 5 + Math.floor(Math.random() * 6), // próximo pulo com pirueta (5-10)
  obstaclesPassed: 0, // contador de obstáculos passados
  nextObsSpinAt: 3, // próximo obstáculo que aciona pirueta
  hitTime: -999, // último momento que levou hit (cooldown de invencibilidade)
  HIT_COOLDOWN: 1.5, // segundos de invencibilidade após hit
  onWave: false,
  surfFrame: 0,
  runFrame: 0,
  surfAnimDone: false,
  surfAltTime: 0,
  obstacles: [],
  nextObstacleTime: 0, // criar imediatamente no início
  spriteLoaded: false,
  obstacleSpriteLoaded: false,
  worldSpeed: UNIT() * 0.08, // velocidade do mundo
  worldOffset: 0, // offset do mundo para movimento
  
  // Score do bônus (separado do score do jogo principal)
  bonusScore: 0,
  bonusGoal: 15, // pontos para completar o bônus e retornar
  phase: 0,
  phaseOverlay: 0,
  lastPointAt: 0,
  nextPhaseAt: 8,
  
  // Score do jogo principal (preservado, não exibido no bônus)
  score: 0,
  
  // Estado do jogo principal salvo
  savedGame: null,
  gameOver: false,
  bonusWon: false,
  lives: 3,
  maxLives: 3
};

SPRITE.onload = () => {
  state.spriteLoaded = true;
  console.log('sprite5.png carregado');
};

// Carregar estado salvo IMEDIATAMENTE (não dentro de onload — cache pode pular)
try {
  const saved = JSON.parse(localStorage.getItem('surf_bonus_return') || '{}');
  if(saved && saved.character) {
    state.savedGame = saved;
    state.lives = saved.lives || 3;
    state.maxLives = saved.maxLives || 3;
  }
} catch(e) {}

OBSTACLE_SPRITE.onload = () => {
  state.obstacleSpriteLoaded = true;
  
  // Sortear sprite inicial
  changeRandomSprite();
  
  // Criar obstáculo inicial com tipo aleatório e distância suficiente
  const firstObs = createObstacle();
  firstObs.x = 1.8; // longe o suficiente para o personagem aparecer primeiro
  firstObs.speed = 0.13;
  firstObs.type = Math.floor(Math.random() * 3); // 0=piranha, 1=tronco, 2=tubarão
  state.obstacles.push(firstObs);
  
  // Iniciar música de fundo
  safePlay(bgMusic);
};

// ----- CONTROLES DE PULO -----
// Contagem de toques extras durante o pulo
let airTapCount = 0;

function handleInput(){
  if(state.mode !== 'surf' || state.gameOver) return;

  if(!state.isJumping){
    // No chão: pula normalmente
    airTapCount = 0;
    state.isJumping = true;
    state.jumpVelocity = -1.5;
    state.jumpTilt = 0;
    state.jumpForwardX = 0;
    state.jumpSpin = 0;
    state.jumpY = 0.01;
    state.jumpCount++;
    // Pirueta automática por contador
    state.jumpDoSpin = (state.jumpCount >= state.nextSpinAt);
    if(state.jumpDoSpin){
      state.nextSpinAt = state.jumpCount + 5 + Math.floor(Math.random() * 6);
    }
    state.jumpSpinDir = Math.random() < 0.5 ? 1 : -1;
    safePlay(jumpSound);
  } else {
    // No ar: contar toques extras
    airTapCount++;
    if(airTapCount >= 2 && !state.jumpDoSpin){
      // 2 toques no ar = ativa pirueta imediata
      state.jumpDoSpin = true;
      state.jumpSpinDir = Math.random() < 0.5 ? 1 : -1;
      state.nextSpinAt = state.jumpCount + 5 + Math.floor(Math.random() * 6);
      airTapCount = 0;
    }
  }
}
cvs.addEventListener('click', handleInput);
window.addEventListener('keydown', (e) => {
  if(e.code === 'Space'){ e.preventDefault(); handleInput(); }
});

// ----- UTILS -----
const lerp = (a,b,t)=>a+(b-a)*t;

// ----- OBSTÁCULOS -----
function createObstacle(){
  const types = [0, 1, 2]; // 3 tipos de obstáculos
  return {
    type: types[Math.floor(Math.random() * types.length)],
    x: 3.0, // sempre fora da tela (direita)
    y: Math.random() * 0.1 - 0.05, // leve variação Y
    phase: Math.random() * Math.PI * 2, // fase inicial para movimento Y
    speed: 0.15, // velocidade base (será ajustada no spawn)
    passed: false // para controle de pontos
  };
}

function drawObstacles(w,h){
  if(!state.obstacleSpriteLoaded) return;
  
  const {ow,oh} = obstacleCellSize();
  const {sw,sh} = spriteCellSize();

  // Tamanho do personagem na tela (mesmo cálculo do drawSurfer)
  const isMobile = w < 600;
  const charScale = isMobile ? 0.45 : 0.55;
  const charH = sh * charScale;

  // Obstáculo = 70% da altura do personagem, proporção mantida
  const targetH = charH * 0.70;
  const targetW = ow * (targetH / oh);

  state.obstacles.forEach(obs => {
    const screenX = (obs.x - state.surferX) * cvs.clientWidth + PLAYER_X;
    const yOffset = Math.sin(obs.phase) * 12;
    
    // tronco (type=1) sobe 1px extra
    const typeYOffset = obs.type === 1 ? -1 : 0;
    ctx.drawImage(
      OBSTACLE_SPRITE,
      0, obs.type * oh, ow, oh,
      screenX, h*WATER_Y - targetH*0.05 + yOffset + typeYOffset,
      targetW, targetH
    );
  });
}

// ----- DESENHO -----
function drawSky(w,h){
  const g = ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#38bdf8');
  g.addColorStop(1,'#f0f9ff');
  ctx.fillStyle=g;
  ctx.fillRect(0,0,w,h);
}

function drawBeach(w,h){
  ctx.fillStyle='#fde68a';
  ctx.fillRect(0,h*GROUND_Y,w,h);
  ctx.fillStyle='#0ea5e9';
  ctx.fillRect(0,h*WATER_Y,w,h);
}

function drawSun(w,h){
  // Sol mais próximo ao personagem e menor em mobile
  const sunX = w < 600 ? w*0.65 : w*0.75; // mais próximo do personagem
  const sunY = w < 600 ? h*0.10 : h*0.12; // mais alto em telas pequenas
  const sunR = w < 600 ? Math.min(25, Math.min(w,h)*0.05) : Math.min(48, Math.min(w,h)*0.10); // bem menor em mobile
  
  ctx.save();
  ctx.globalAlpha = 0.9;
  ctx.fillStyle = '#ffd700';
  ctx.beginPath(); ctx.arc(sunX, sunY, sunR, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 0.3;
  ctx.fillStyle = '#ffed4e';
  ctx.beginPath(); ctx.arc(sunX, sunY, sunR*1.4, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawWave(w,h){
  if(!state.spriteLoaded) return;

  const {sw,sh}=spriteCellSize();
  const row = Math.floor(state.wavePhase*1.5) % 2; // alterna linhas 1 e 2
  let frame = Math.floor(state.wavePhase*5) % SPR_COLS;
  // descarta 1º frame da linha 1 (ruim)
  if(row === 0 && frame === 0) frame = 1;
  const sx = frame*sw;
  const sy = row*sh;

  // Converter coordenadas de mundo para tela
  const waveScreenX = (state.waveX - state.surferX) * w + PLAYER_X;

  // onda mais à esquerda (atrás da prancha), com mais afastamento
  const dx = waveScreenX - sw*0.30; // mais longe do surfista (aumentado de 0.25 para 0.30)
  const dy = h*WATER_Y + Math.sin(state.wavePhase)*WAVE_AMPLITUDE - sh*0.57; // volta à posição original

  ctx.drawImage(
    SPRITE,
    sx, sy, sw, sh,
    dx, dy,
    sw*1.1, sh*1.1 - 1  // remove 1 pixel da altura
  );
}

function drawRunner(w,h){
  if(!state.spriteLoaded) return;

  const {sw,sh}=spriteCellSize();
  let frame = Math.floor(state.runFrame) % SPR_COLS;
  // ignora o 1º frame da corrida (ruim)
  if(frame === 0) frame = 1;
  const sx = frame*sw + 3; // corta 3 pixels da esquerda
  const sy = 2*sh; // linha 3 (corrida)

  // Ajustar tamanho do personagem para mobile
  const isMobile = w < 600;
  const scale = isMobile ? 0.7 : 0.55; // maior em mobile

  // Corredor sempre na posição fixa do jogador
  const dx = PLAYER_X - sw*0.15;
  const dy = h*GROUND_Y - sh*0.35;

  ctx.drawImage(
    SPRITE,
    sx, sy, sw - 3, sh, // remove 3 pixels de cada lado
    dx, dy,
    sw*scale, sh*scale // tamanho ajustado
  );
}

function drawSurfer(w,h){
  if(!state.spriteLoaded) return;

  const {sw,sh}=spriteCellSize();
  const frame = Math.floor(state.surfFrame) % SPR_COLS;
  const sx = frame*sw + 3; // corta 3 pixels da esquerda
  const sy = 3*sh; // linha 4 (subindo na prancha / surf)

  // Ajustar tamanho do personagem para mobile - muito menor agora
  const isMobile = w < 600;
  const scale = isMobile ? 0.45 : 0.55; // bem menor em mobile
  
  // Surfista sempre na posição fixa do jogador (+ deslocamento horizontal do pulo)
  const dx = PLAYER_X - sw*0.15 + (state.jumpForwardX || 0);
  const dy = h*SURFER_Y - sh*0.35 + state.surferY - (state.jumpY * h * 0.32);

  ctx.save();

  // Piscar durante invencibilidade (alterna a cada 0.1s)
  const isInvincible = (state.t - state.hitTime) < state.HIT_COOLDOWN;
  if(isInvincible && Math.floor(state.t * 10) % 2 === 0){
    ctx.restore();
    return; // pula o desenho nesse frame (efeito piscar)
  }

  // Inclinação para frente durante o pulo (sem pirueta)
  if(state.isJumping && !state.jumpDoSpin && state.jumpTilt !== 0){
    const cx = dx + (sw*scale)*0.5;
    const cy = dy + (sh*scale)*0.5;
    ctx.translate(cx, cy);
    ctx.rotate(state.jumpTilt);
    ctx.translate(-cx, -cy);
  }

  // Pirueta durante o pulo (só quando ativada)
  if(state.isJumping && state.jumpDoSpin && state.jumpSpin !== 0){
    const cx = dx + (sw*scale)*0.5;
    const cy = dy + (sh*scale)*0.5;
    ctx.translate(cx, cy);
    ctx.rotate(state.jumpSpin);
    ctx.translate(-cx, -cy);
  }

  ctx.drawImage(
    SPRITE,
    sx, sy, sw - 3, sh, // remove 3 pixels de cada lado
    dx, dy,
    sw*scale, sh*scale // tamanho ajustado
  );
  
  ctx.restore();
}

// ----- UPDATE -----
function update(dt){
  state.t+=dt;

  // spawn de obstáculos — máx 2 na tela, espaçamento mínimo garantido, dificuldade por fase
  const MAX_OBS_ON_SCREEN = 2;
  const onScreen = state.obstacles.filter(o => o.x > state.surferX - 0.5).length;
  if(state.mode === 'surf' && state.t >= state.nextObstacleTime && onScreen < MAX_OBS_ON_SCREEN){
    const newObstacle = createObstacle();
    // Garantir espaçamento mínimo com o obstáculo mais à direita
    const rightmost = state.obstacles.reduce((max, o) => Math.max(max, o.x), 0);
    const minGap = 1.8 - state.phase * 0.1; // gap diminui com as fases (min 1.2)
    newObstacle.x = Math.max(2.5, rightmost + Math.max(1.2, minGap) + Math.random() * 0.5);
    // Velocidade baseada na fase
    newObstacle.speed = 0.13 + state.phase * 0.025;
    state.obstacles.push(newObstacle);
    // Intervalo entre spawns diminui com as fases
    const spawnInterval = Math.max(1.5, 4.0 - state.phase * 0.4);
    state.nextObstacleTime = state.t + spawnInterval;
  }

  // atualizar obstáculos (movimento do mundo) - NUNCA REMOVER
  state.obstacles.forEach(obs => {
    obs.x -= dt * obs.speed; // move da direita para esquerda no mundo
    obs.phase += dt * 2; // movimento Y
    
    // Verificar colisão com o surfista — hitbox baseada no tamanho real dos sprites
    if(state.mode === 'surf' && !state.gameOver && (state.t - state.hitTime) > state.HIT_COOLDOWN) {
      const obsScreenX = (obs.x - state.surferX) * cvs.clientWidth + PLAYER_X;
      const yOffset = Math.sin(obs.phase) * 12;

      // Tamanho real do personagem na tela
      const {sw,sh} = spriteCellSize();
      const {ow,oh} = obstacleCellSize();
      const isMobile = cvs.clientWidth < 600;
      const charScale = isMobile ? 0.45 : 0.55;
      const charW = sw * charScale;
      const charH = sh * charScale;

      // Tamanho real do obstáculo na tela (mesmo cálculo do drawObstacles)
      const targetH = charH * 0.70;
      const targetW = ow * (targetH / oh);

      const surferX = PLAYER_X - sw * 0.15;
      const surferY = cvs.clientHeight*SURFER_Y - sh*0.35 + state.surferY - (state.jumpY * cvs.clientHeight * 0.3);
      const obsY = cvs.clientHeight*WATER_Y - targetH*0.05 + yOffset;

      // Hitbox do surfista (margem 20% nas bordas)
      const surferHitbox = {
        x: surferX + charW * 0.20,
        y: surferY + charH * 0.15,
        w: charW * 0.60,
        h: charH * 0.70
      };

      // Hitbox customizada por tipo de obstáculo
      // tipo 0=piranha (quadrado), 1=tronco (largo/baixo), 2=tubarão (barbatana fina/alta)
      let obsHitbox;
      if(obs.type === 1){ // tronco — largo e baixo
        obsHitbox = {
          x: obsScreenX + targetW * 0.05,
          y: obsY + targetH * 0.40,
          w: targetW * 0.90,
          h: targetH * 0.35
        };
      } else if(obs.type === 2){ // tubarão — barbatana fina e alta
        obsHitbox = {
          x: obsScreenX + targetW * 0.30,
          y: obsY + targetH * 0.05,
          w: targetW * 0.40,
          h: targetH * 0.60
        };
      } else { // piranha — hitbox central
        obsHitbox = {
          x: obsScreenX + targetW * 0.15,
          y: obsY + targetH * 0.20,
          w: targetW * 0.70,
          h: targetH * 0.55
        };
      }
      
      // Verificar colisão
      if(obsHitbox.x < surferHitbox.x + surferHitbox.w &&
         obsHitbox.x + obsHitbox.w > surferHitbox.x &&
         obsHitbox.y < surferHitbox.y + surferHitbox.h &&
         obsHitbox.y + obsHitbox.h > surferHitbox.y) {
        
        // Perder uma vida
        state.lives--;
        state.hitTime = state.t; // ativa cooldown
        safePlay(hitSound);
        
        if(state.lives <= 0) {
          // Game over!
          state.gameOver = true;
          
          const finalState = {
            ...state.savedGame,
            score: (state.savedGame?.score||0) + state.bonusScore,
            lives: state.savedGame?.livesOnEntry ?? state.savedGame?.lives ?? 1,
            _returned: true,
            bonusSurfCompleted: false
          };
          localStorage.setItem('surf_bonus_return', JSON.stringify(finalState));
          setTimeout(() => { window.location.href = './return_from_surf.html'; }, 1500);
          return;
        } else {
          // Resetar obstáculo que colidiu
          obs.x = 3.0 + Math.random() * 2.0;
          obs.passed = true; // não pontua o obstáculo que causou dano
        }
      }
    }
    
    // Verificar se passou pelo jogador (ponto)
    if(!obs.passed && obs.x < state.surferX){
      obs.passed = true;
      state.bonusScore++;
      state.obstaclesPassed++;
      if(state.obstaclesPassed >= state.nextObsSpinAt){
        state.nextSpinAt = state.jumpCount;
        state.nextObsSpinAt = state.obstaclesPassed + 3;
      }
      
      const tNow = performance.now();
      if(tNow - state.lastPointAt > 80) {
        safePlay(pointSound);
        state.lastPointAt = tNow;
      }

      // Vitória: completou o bônus!
      if(state.bonusScore >= state.bonusGoal && !state.bonusWon){
        state.bonusWon = true;
        state.gameOver = true;
        const finalState = {
          ...state.savedGame,
          score: (state.savedGame?.score||0) + state.bonusScore,
          lives: state.savedGame?.livesOnEntry ?? state.savedGame?.lives ?? state.lives,
          _returned: true,
          bonusSurfCompleted: true
        };
        localStorage.setItem('surf_bonus_return', JSON.stringify(finalState));
        setTimeout(() => { window.location.href = './return_from_surf.html'; }, 2000);
        return;
      }
      
      // Fase baseada no bonusScore
      if(state.bonusScore >= state.nextPhaseAt) {
        state.phase = Math.min(3, state.phase + 1);
        state.phaseOverlay = 4.4;
        state.nextPhaseAt += 8;
        safePlay(phaseSound);
        changeRandomSprite();
        state.obstacles.forEach(o => { o.speed = 0.13 + (state.phase * 0.025); });
      }
    }
    
    // Se sair da tela, volta para o começo (sem reset)
    if(obs.x < -2.0){
      obs.x = 3.0 + Math.random() * 2.0; // volta para fora da tela
      obs.passed = false; // reset para poder pontuar novamente
    }
  });

  if(state.mode==='run'){
    state.runFrame+=dt*12;
    if(state.runFrame >= 5) state.runFrame = 0; // reset de frame
    
    // Personagem se move no mundo, mas fica fixo na tela
    state.surferX = Math.min(0.35, state.surferX + dt*0.015);
    
    // Onda se aproxima no mundo (lógica original)
    state.waveX+=dt*WAVE_SPEED;
    state.wavePhase+=dt*1.5;

    // Transição mais segura
    const waveDistance = Math.abs(state.waveX - state.surferX);
    if(waveDistance < 0.08){ // distância segura para transição
      state.mode='surf';
      state.onWave=true;
      state.surfFrame = 0;
      state.surfAnimDone = false;
      state.surfAltTime = state.t;
      console.log('Transição para surf mode - distância:', waveDistance.toFixed(3));
    }
  }

  if(state.mode === 'surf'){
    state.waveX+=dt*WAVE_SPEED;
    // REMOVIDO: reset da onda - agora continua infinitamente
    state.wavePhase+=dt*1.5;
    
    // Física do pulo com inclinação e movimento para frente
    if(state.isJumping){
      state.jumpVelocity += 2.2 * dt; // gravidade
      state.jumpY -= state.jumpVelocity * dt;

      // Movimento para frente: vai e volta suavemente
      const fwdSpeed = 18; // pixels de avanço total
      if(state.jumpVelocity < 0){
        // Subindo: move para frente e inclina para frente
        state.jumpForwardX = Math.min(fwdSpeed, state.jumpForwardX + dt * fwdSpeed * 2.5);
        state.jumpTilt = Math.max(-0.25, state.jumpTilt - dt * 3.5);
      } else {
        // Descendo: volta para posição original e endireita
        state.jumpForwardX = Math.max(0, state.jumpForwardX - dt * fwdSpeed * 2.5);
        state.jumpTilt = Math.min(0, state.jumpTilt + dt * 3.5);
      }

      // Pirueta: gira 360° devagar (~1.1s), apenas quando ativada
      if(state.jumpDoSpin){
        state.jumpSpin += dt * state.jumpSpinDir * (Math.PI * 2 / 1.1);
      }

      // Verificar se aterrissou
      if(state.jumpY <= 0){
        state.jumpY = 0;
        state.jumpVelocity = 0;
        state.isJumping = false;
        state.jumpTilt = 0;
        state.jumpForwardX = 0;
        state.jumpSpin = 0;
        state.jumpDoSpin = false;
      }
    }
    
    // Onda empurra o surfista no mundo
    state.surferX = lerp(state.surferX, state.waveX + WAVE_PUSH_DIST + 0.15, dt * 2);
    state.surferY = Math.sin(state.wavePhase) * WAVE_AMPLITUDE;

    if(!state.surfAnimDone){
      state.surfFrame += dt * 3;
      
      // Lógica segura de frames
      if(state.surfFrame >= 1 && state.surfFrame < 3){
        state.surfFrame = 3; // pula para o frame 3
      }
      if(state.surfFrame >= 4){
        state.surfFrame = 4; // para no último quadro
        state.surfAnimDone = true;
        state.surfAltTime = state.t;
        console.log('Animação de surf concluída - frame final:', state.surfFrame);
      }
    } else {
      // intercala automaticamente entre frames 3 e 4 uma vez por segundo
      if(state.t - state.surfAltTime >= 1){
        state.surfFrame = state.surfFrame === 4 ? 3 : 4;
        state.surfAltTime = state.t;
      }
    }
  }
}

// ----- LOOP -----
let last=performance.now();
function loop(now){
  const dt=Math.min(0.032,(now-last)/1000); last=now;
  
  update(dt);

  const w=cvs.clientWidth, h=cvs.clientHeight;

  // fundo
  drawSky(w,h);
  drawSun(w,h); // sol do jogo principal
  drawBeach(w,h);

  // onda desenha em todos os modos (vem de trás)
  drawWave(w,h);

  // obstáculos (atrás do surfista)
  drawObstacles(w,h);

  // personagem na frente (sempre fixo na tela)
  if(state.mode==='run'){
    drawRunner(w,h);
  } else {
    drawSurfer(w,h);
  }

  // debug removido para mobile
  
  // HUD de score e vidas
  const isMobile = w < 600;
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0, 0, w, isMobile ? 38 : 48);
  ctx.fillStyle = '#fff';
  ctx.font = isMobile ? 'bold 14px system-ui' : 'bold 18px system-ui';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  const displayScore = (state.savedGame?.score || 0) + state.bonusScore;
  ctx.fillText(`SCORE ${displayScore}`, isMobile ? 10 : 14, isMobile ? 19 : 24);
  ctx.textAlign = 'left';
  ctx.fillText('Vidas: ', w - (isMobile ? 120 : 150), isMobile ? 19 : 24);
  
  // Desenhar corações - menores em mobile
  const heartSize = isMobile ? 15 : 25;
  const heartSpacing = isMobile ? 18 : 25;
  for(let i = 0; i < state.maxLives; i++){
    const x = w - (isMobile ? 60 : 80) + i * heartSpacing;
    const y = isMobile ? 11 : 14;
    
    if(i < state.lives){
      // Coração cheio
      ctx.fillStyle = '#ff4444';
      ctx.beginPath();
      ctx.moveTo(x + heartSize*0.32, y + heartSize*0.24);
      ctx.bezierCurveTo(x + heartSize*0.32, y + heartSize*0.08, x + heartSize*0.16, y + heartSize*0.08, x + heartSize*0.16, y + heartSize*0.24);
      ctx.bezierCurveTo(x + heartSize*0.16, y + heartSize*0.40, x + heartSize*0.32, y + heartSize*0.56, x + heartSize*0.48, y + heartSize*0.56);
      ctx.bezierCurveTo(x + heartSize*0.64, y + heartSize*0.56, x + heartSize*0.80, y + heartSize*0.40, x + heartSize*0.80, y + heartSize*0.24);
      ctx.bezierCurveTo(x + heartSize*0.80, y + heartSize*0.08, x + heartSize*0.64, y + heartSize*0.08, x + heartSize*0.48, y + heartSize*0.24);
      ctx.bezierCurveTo(x + heartSize*0.40, y + heartSize*0.32, x + heartSize*0.32, y + heartSize*0.24, x + heartSize*0.32, y + heartSize*0.24);
      ctx.fill();
    } else {
      // Coração vazio
      ctx.strokeStyle = '#ff4444';
      ctx.lineWidth = isMobile ? 1 : 2;
      ctx.beginPath();
      ctx.moveTo(x + heartSize*0.32, y + heartSize*0.24);
      ctx.bezierCurveTo(x + heartSize*0.32, y + heartSize*0.08, x + heartSize*0.16, y + heartSize*0.08, x + heartSize*0.16, y + heartSize*0.24);
      ctx.bezierCurveTo(x + heartSize*0.16, y + heartSize*0.40, x + heartSize*0.32, y + heartSize*0.56, x + heartSize*0.48, y + heartSize*0.56);
      ctx.bezierCurveTo(x + heartSize*0.64, y + heartSize*0.56, x + heartSize*0.80, y + heartSize*0.40, x + heartSize*0.80, y + heartSize*0.24);
      ctx.bezierCurveTo(x + heartSize*0.80, y + heartSize*0.08, x + heartSize*0.64, y + heartSize*0.08, x + heartSize*0.48, y + heartSize*0.24);
      ctx.bezierCurveTo(x + heartSize*0.40, y + heartSize*0.32, x + heartSize*0.32, y + heartSize*0.24, x + heartSize*0.32, y + heartSize*0.24);
      ctx.stroke();
    }
  }
  
  // Overlay de game over / vitória
  if(state.gameOver){
    ctx.save();
    ctx.fillStyle = state.bonusWon ? 'rgba(0,80,20,0.85)' : 'rgba(0,0,0,0.82)';
    ctx.fillRect(0,0,w,h);
    ctx.fillStyle = state.bonusWon ? '#fde047' : '#fff';
    ctx.font = isMobile ? 'bold 32px system-ui' : 'bold 48px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(state.bonusWon ? '🏄 INCRÍVEL!' : 'GAME OVER', w/2, h/2 - (isMobile?20:30));
    ctx.fillStyle = '#fff';
    ctx.font = isMobile ? '18px system-ui' : '24px system-ui';
    ctx.fillText(state.bonusWon ? 'Voltando ao jogo...' : `Score Final: ${state.score}`, w/2, h/2 + (isMobile ? 20 : 30));
    if(state.bonusWon){
      ctx.font = isMobile ? '14px system-ui' : '18px system-ui';
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.fillText(`+${state.bonusScore} pontos ganhos!`, w/2, h/2 + (isMobile ? 46 : 70));
    }
    ctx.restore();
  }
  
  // Overlay de fase - ajustado para mobile
  if(state.phaseOverlay > 0){
    ctx.save();
    ctx.globalAlpha = Math.min(1, state.phaseOverlay);
    ctx.fillStyle = '#fff';
    
    // Ajustar tamanho da fonte para mobile
    const fontSize = isMobile ? '28px' : '48px';
    ctx.font = `bold ${fontSize} system-ui`;
    ctx.textAlign = 'center';
    ctx.fillText(`FASE ${state.phase + 1}`, w/2, h/2);
    ctx.restore();
    state.phaseOverlay -= dt;
  }

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
